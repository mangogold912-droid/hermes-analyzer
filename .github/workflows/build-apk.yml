name: Build Hermes Analyzer APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12266719'
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

    - run: chmod +x gradlew

    - run: ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log

    - name: Find APK path
      id: apk
      run: |
        APK=$(find app/build -name "*.apk" -print -quit)
        echo "path=$APK" >> $GITHUB_OUTPUT
        echo "APK found: $APK"
        ls -lh "$APK"

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log

    - uses: actions/upload-artifact@v4
      with:
        name: HermesAnalyzer-Debug
        path: app/build/outputs/apk/debug/
        if-no-files-found: warn

    - name: Create Release with APK Asset
      if: github.ref == 'refs/heads/main'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const apkPath = '${{ steps.apk.outputs.path }}';
          const tag = 'v' + context.runNumber;

          console.log('APK path:', apkPath);

          if (!apkPath || !fs.existsSync(apkPath)) {
            console.log('No APK found, skipping release asset');
            // Still create release without asset
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: 'Hermes Analyzer ' + tag,
              body: '## Hermes Analyzer ' + tag + '

- 50 RE Plugins
- C++ Disassembler
- IDA MCP
- 8 AI Platforms
- AI Chat
- Terminal',
            });
            return;
          }

          // Create release
          const { data: release } = await github.rest.repos.createRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag_name: tag,
            name: 'Hermes Analyzer ' + tag,
            body: '## Hermes Analyzer ' + tag + '

### Features
- 50 Reverse Engineering Plugins
- C++ Native Disassembler
- IDA Pro MCP Server
- 8 AI Platforms
- AI Chat with Memory
- Built-in Terminal',
          });

          console.log('Release created:', release.id);

          // Upload APK asset
          const apkName = path.basename(apkPath);
          const apkData = fs.readFileSync(apkPath);

          await github.rest.repos.uploadReleaseAsset({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: release.id,
            name: apkName,
            data: apkData,
            headers: {
              'content-type': 'application/vnd.android.package-archive',
              'content-length': apkData.length
            }
          });

          console.log('APK uploaded:', apkName, apkData.length, 'bytes');
