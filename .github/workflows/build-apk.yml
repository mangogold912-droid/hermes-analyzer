name: Build Hermes Analyzer APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12266719'
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK with wrapper
      run: ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log

    - name: Find APK path
      id: apk
      run: |
        APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
        echo "APK path: $APK_PATH"
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "APK size: $(ls -lh $APK_PATH | awk '{print $5}')"

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 5

    - name: Upload Debug APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: HermesAnalyzer-Debug
        path: ${{ steps.apk.outputs.apk_path }}
        retention-days: 30

    - name: Show APK info
      if: success()
      run: |
        echo "========================================"
        echo "  APK Build Complete!"
        echo "========================================"
        ls -lh ${{ steps.apk.outputs.apk_path }}

    - name: Create Release
      if: github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.apk.outputs.apk_path }}
        tag_name: v${{ github.run_number }}
        name: Hermes Analyzer v${{ github.run_number }}
        body: |
          ## Hermes Analyzer v${{ github.run_number }}

          ### Features
          - 50 Reverse Engineering Plugins (RE Discord Community Tools)
          - C++ Native Disassembler (Capstone)
          - IDA Pro MCP Server Integration
          - 8 AI Platforms Parallel Analysis
          - AI Chat with Memory & Auto-Plugin Execution
          - Built-in Terminal (xterm.js)
          - MANAGE_EXTERNAL_STORAGE (All files access)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
