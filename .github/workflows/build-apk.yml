name: Build Hermes Analyzer APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12266719'
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
    - run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
    - run: chmod +x gradlew
    - name: Build APK
      run: |
        ./gradlew clean assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log
        echo "=== BUILD SUCCESS ==="
    - name: Upload Build Log on Failure
      if: failure()
      run: |
        echo "=== LAST 100 LINES OF ERROR ==="
        tail -100 build.log
        echo "=== KOTLIN ERRORS ==="
        grep -n "\.kt:" build.log | tail -20
        echo "=== FULL ERROR LOG ==="
        cat build.log
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-error-log
        path: build.log
    - name: Check APK
      if: success()
      run: |
        echo "=== APK Search ==="
        find app/build -name "*.apk" -ls
        ls -la app/build/outputs/apk/debug/
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: HermesAnalyzer-Debug
        path: app/build/outputs/apk/debug/
        if-no-files-found: warn
    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: v${{ github.run_number }}
        name: Hermes Analyzer v${{ github.run_number }}
        body: |
          ## Hermes Analyzer v${{ github.run_number }}

          ### Features
          - 50 Reverse Engineering Plugins
          - C++ Native Disassembler
          - IDA Pro MCP Server
          - 8 AI Platforms
          - AI Chat with Memory
          - Built-in Terminal
          - All files access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

