name: Build Hermes Analyzer APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12266719'
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
    - run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
    - run: chmod +x gradlew
    - name: Build APK
      run: |
        set -o pipefail
        ./gradlew clean assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log || true
        echo "=== BUILD COMPLETE ==="
    - name: Check APK and Output Errors
      if: always()
      run: |
        echo "=== APK Search ==="
        find app/build -name "*.apk" -ls 2>/dev/null || echo "No APK found"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug dir"
        echo "=== LAST 50 LINES OF BUILD LOG ==="
        tail -50 build.log
        echo "=== ERROR PATTERNS ==="
        grep -n "error:" build.log | tail -10 || echo "No 'error:' lines found"
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: HermesAnalyzer-Debug
        path: app/build/outputs/apk/debug/
        if-no-files-found: warn
    - name: Create Release
      if: github.ref == 'refs/heads/main' && hashFiles('app/build/outputs/apk/debug/*.apk') != ''
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: v${{ github.run_number }}
        name: Hermes Analyzer v${{ github.run_number }}
        body: |
          ## Hermes Analyzer v${{ github.run_number }}

          ### Features
          - 50 Reverse Engineering Plugins
          - C++ Native Disassembler
          - IDA Pro MCP Server
          - 8 AI Platforms
          - AI Chat with Memory
          - Built-in Terminal
          - All files access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

