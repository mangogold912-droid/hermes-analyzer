name: Build Hermes Analyzer APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12266719'
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
    - name: Debug SDK
      run: |
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
        echo "ANDROID_HOME=$ANDROID_HOME"
        ls -la $ANDROID_SDK_ROOT/ 2>/dev/null || echo "SDK root not found"
        ls -la $ANDROID_SDK_ROOT/platforms/ 2>/dev/null || echo "No platforms"
        ls -la $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo "No build-tools"
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        cat local.properties
    - run: chmod +x gradlew
    - name: Build APK
      run: ./gradlew assembleDebug --info --stacktrace --no-daemon 2>&1 | tee build.log
    - name: Check APK
      run: |
        echo "=== APK files ==="
        find app/build -name "*.apk" 2>/dev/null || echo "No APK files"
        echo "=== All outputs ==="
        ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs dir"
        echo "=== Build dir ==="
        ls -la app/build/ 2>/dev/null || echo "No build dir"
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
