name: Build Hermes Analyzer APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12266719'
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
    - run: chmod +x gradlew
    - run: ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log
    - run: find app/build -name "*.apk"
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
    - uses: actions/upload-artifact@v4
      with:
        name: HermesAnalyzer-Debug
        path: app/build/outputs/apk/debug/
        if-no-files-found: warn
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        APK=$(find app/build -name "*.apk" | head -1)
        if [ -f "$APK" ]; then
          echo "Creating release with $APK"
          gh release create "v${GITHUB_RUN_NUMBER}" "$APK"             --repo "${GITHUB_REPOSITORY}"             --title "Hermes Analyzer v${GITHUB_RUN_NUMBER}"             --notes "Build ${GITHUB_RUN_NUMBER}"
        else
          echo "No APK found"
        fi
