name: Build Hermes Analyzer APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12266719'
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
    - run: chmod +x gradlew
    - run: ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log
    - run: find app/build -name "*.apk"
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
    - uses: actions/upload-artifact@v4
      with:
        name: HermesAnalyzer-Debug
        path: app/build/outputs/apk/debug/
        if-no-files-found: warn
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat > /tmp/release.py << 'EOF'
        import os, urllib.request, json
        token = os.environ['GITHUB_TOKEN']
        repo = os.environ.get('GITHUB_REPOSITORY', '')
        run_num = os.environ.get('GITHUB_RUN_NUMBER', '0')
        tag = 'v' + run_num

        apk_path = None
        for root, dirs, files in os.walk('app/build'):
            for f in files:
                if f.endswith('.apk'):
                    apk_path = os.path.join(root, f)
                    break
            if apk_path:
                break

        if not apk_path:
            print("No APK found")
            exit(1)

        print(f"APK: {apk_path} ({os.path.getsize(apk_path)} bytes)")

        req = urllib.request.Request(
            f"https://api.github.com/repos/{repo}/releases",
            data=json.dumps({"tag_name": tag, "name": f"Hermes Analyzer {tag}", "body": f"Build {tag}"}).encode(),
            headers={"Authorization": f"token {token}", "Content-Type": "application/json"}
        )
        with urllib.request.urlopen(req) as resp:
            release = json.loads(resp.read().decode())
            upload_url = release['upload_url'].replace('{?name,label}', '')
            print(f"Release: {release['id']}")

        apk_name = os.path.basename(apk_path)
        with open(apk_path, 'rb') as f:
            data = f.read()

        req2 = urllib.request.Request(
            f"{upload_url}?name={apk_name}",
            data=data,
            headers={"Authorization": f"token {token}", "Content-Type": "application/vnd.android.package-archive", "Content-Length": str(len(data))}
        )
        with urllib.request.urlopen(req2) as resp:
            print(f"Uploaded: {json.loads(resp.read().decode())['browser_download_url']}")
        EOF
        python3 /tmp/release.py
