name: Build Hermes Analyzer APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 수동 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # === 1. 소스코드 체크아웃 ===
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # === 2. Java 17 설정 ===
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # === 3. Android SDK 설정 ===
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12266719'
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

    # === 4. Gradle 캐시 (빌드 속도 향상) ===
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # === 5. Gradle 실행 권한 ===
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # === 6. APK 빌드 (Debug) ===
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    # === 7. APK 아티팩트 업로드 ===
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: HermesAnalyzer-Debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    # === 8. APK 정보 출력 ===
    - name: Show APK info
      run: |
        echo "========================================"
        echo "  APK Build Complete!"
        echo "========================================"
        ls -lh app/build/outputs/apk/debug/*.apk
        echo ""
        # APK 크기
        du -h app/build/outputs/apk/debug/app-debug.apk

    # === 9. GitHub Release에 자동 업로드 (선택) ===
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: v${{ github.run_number }}
        name: Hermes Analyzer v${{ github.run_number }}
        body: |
          ## Hermes Analyzer - Automated Build
          
          ### Features
          - IDA Pro MCP Server Integration
          - 8 AI Platforms Parallel Analysis (OpenAI, Kimi, Qwen, Gemini, Claude, DeepSeek, Ollama, Suprninja)
          - AI Chat Interface
          - Binary Analysis (ELF, DEX, APK, SO)
          - Local Disassembler (ARM64, x86)
          
          ### How to Install
          1. Download the APK below
          2. Enable "Install from Unknown Sources" in Settings
          3. Install the APK
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
