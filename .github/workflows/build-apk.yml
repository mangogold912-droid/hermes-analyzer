name: Build Hermes Analyzer APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12266719'
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: HermesAnalyzer-Debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Show APK info
      run: |
        echo "========================================"
        echo "  APK Build Complete!"
        echo "========================================"
        ls -lh app/build/outputs/apk/debug/*.apk || echo "No APK found"

    - name: Create Release
      if: github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: v${{ github.run_number }}
        name: Hermes Analyzer v${{ github.run_number }}
        body: |
          ## Hermes Analyzer - Full Featured Build

          ### Features
          - C++ Native Disassembler (Capstone) - ARM64/ARM/x86/x64
          - IDA Pro MCP Server Integration (External + Internal via Termux)
          - 8 AI Platforms Parallel Analysis (OpenAI, Kimi, Qwen, Gemini, Claude, DeepSeek, Ollama, Suprninja)
          - AI Chat Interface
          - Reinforcement Learning (Feedback-based AI improvement)
          - Unlimited File Size Processing
          - MANAGE_EXTERNAL_STORAGE (All files access)
          - Termux Auto-Setup for IDA Pro Linux
          - Binary Analysis (ELF, DEX, APK, SO)

          ### How to Install
          1. Download APK below
          2. Enable "Install from Unknown Sources"
          3. Grant "All files access" permission on first launch
          4. Optional: Tap "IDA Mobile" to setup Termux + Debian + IDA MCP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
