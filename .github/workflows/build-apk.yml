name: Build Hermes Analyzer APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12266719'
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

    - run: chmod +x gradlew

    - run: ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log

    - name: Find APK
      id: find_apk
      run: |
        APK=$(find app/build -name "*.apk" | head -1)
        echo "apk=$APK" >> $GITHUB_OUTPUT
        echo "APK: $APK"

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log

    - uses: actions/upload-artifact@v4
      with:
        name: HermesAnalyzer-Debug
        path: app/build/outputs/apk/debug/
        if-no-files-found: warn

    - name: Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: v${{ github.run_number }}
        name: Hermes Analyzer v${{ github.run_number }}
        body: |
          ## Hermes Analyzer v${{ github.run_number }}

          ### Features
          - 50 Reverse Engineering Plugins (RE Discord Community Tools)
          - C++ Native Disassembler (Capstone)
          - IDA Pro MCP Server Integration
          - 8 AI Platforms Parallel Analysis
          - AI Chat with Memory & Auto-Plugin Execution
          - Built-in Terminal (xterm.js)
          - MANAGE_EXTERNAL_STORAGE (All files access)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
